<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Harness GUI v2 — Paletas refinadas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0d; }
  #root { width: 100%; height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="harness-icons.jsx"></script>
<script type="text/babel" src="themes-v2.jsx"></script>
<script type="text/babel" src="harness-table-v2.jsx"></script>

<script type="text/babel">
function App() {
  const T = window.HARNESS_V2_THEMES;
  const GUI = window.HarnessGUIv2;

  const boards = [
    {
      id: 'warmth',
      label: '01 · Warmth — modo oscuro cálido',
      width: 1920, height: 1120,
      theme: T.warmthA,
    },
    {
      id: 'paper',
      label: '02 · Paper — modo claro',
      width: 1920, height: 1120,
      theme: T.paperA,
    },
  ];

  return (
    <DesignCanvas
      title="Harness GUI — Paleta refinada v2"
      subtitle="Dos paletas base: modo oscuro cálido · modo claro"
    >
      <DCSection id="themes" title="Variaciones de paleta">
        {boards.map(b => (
          <DCArtboard key={b.id} id={b.id} label={b.label} width={b.width} height={b.height}>
            <GUI theme={b.theme} />
          </DCArtboard>
        ))}
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
