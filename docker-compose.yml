services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: harness/backend:latest
    container_name: harness-backend
    ports:
      - "${BACKEND_PORT:-7777}:7777"
    environment:
      HARNESS_HOME: /data
      HARNESS_API_TOKEN: ${HARNESS_API_TOKEN:?Set HARNESS_API_TOKEN in .env}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ${HARNESS_HOME:-~/.harness}:/data
    networks:
      - harness
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: harness/frontend:latest
    container_name: harness-frontend
    ports:
      - "${FRONTEND_PORT:-8080}:8080"
    environment:
      PUBLIC_API_BASE: http://backend:7777/api
      PUBLIC_HARNESS_API_TOKEN: ${HARNESS_API_TOKEN:?Set HARNESS_API_TOKEN in .env}
      NODE_ENV: production
      PORT: "8080"
    depends_on:
      - backend
    networks:
      - harness
    restart: unless-stopped

networks:
  harness:
    driver: bridge
