<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>Harness DEV TOOL</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #d8d4ca; }
  #root { width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.13); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.22); }
  input::placeholder { color: #9e9890; }
  button { font-family: inherit; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="harness-icons.jsx"></script>
<script type="text/babel" src="harness-agents.jsx"></script>
<script type="text/babel" src="harness-interactive.jsx"></script>
<script type="text/babel" src="harness-ssh.jsx"></script>

<script type="text/babel">
const { useState } = React;

// ── Shared theme tokens ──────────────────────────────────────────────────────
const C = {
  mono: "'JetBrains Mono','Fira Code',ui-monospace,Menlo,monospace",
  ui:   "'Inter',ui-sans-serif,system-ui,sans-serif",
  bg:   '#fdfcf8', panelBg:'#f5f3ed', border:'#e2ded6',
  text: '#1c1a16', muted:'#9e9890',
  accent:'#0d7a62', accentBg:'rgba(13,122,98,0.09)',
  railBg:'#ede9df',
};

// ── NAV ITEMS ────────────────────────────────────────────────────────────────
const NAV = [
  { id:'agents',   label:'Agents',   icon: <HIcon.Sparkles /> },
  { id:'sql',      label:'SQL',      icon: <HIcon.SQL />      },
  { id:'ssh',      label:'SSH',      icon: <HIcon.SSH />      },
  { id:'memory',   label:'Memory',   icon: <HIcon.Memory />,  soon:true },
  { id:'settings', label:'Settings', icon: <HIcon.Settings/>, soon:true },
];

// ── SHARED CHROME ─────────────────────────────────────────────────────────────
function AppShell({ children, activeNav, setActiveNav }) {
  return (
    <div style={{
      width:'100%', maxWidth:1600, height:'100%', maxHeight:968,
      background:C.bg, color:C.text,
      fontFamily:C.ui, fontSize:13,
      display:'flex', flexDirection:'column',
      borderRadius:12, overflow:'hidden',
      border:`1px solid ${C.border}`,
      boxShadow:'0 32px 80px rgba(40,35,25,0.18)',
    }}>
      {/* ── TITLE BAR ── */}
      <div style={{
        height:42, background:'#f0ede5',
        borderBottom:`1px solid ${C.border}`,
        display:'grid', gridTemplateColumns:'140px 1fr 200px',
        alignItems:'center', padding:'0 16px', flexShrink:0,
      }}>
        {/* Traffic lights + wordmark */}
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{display:'flex',gap:7}}>
            {['#ed6a5e','#f4bf4f','#61c554'].map((c,i)=>(
              <span key={i} style={{width:12,height:12,borderRadius:'50%',background:c,cursor:'pointer'}}/>
            ))}
          </div>
          <div style={{display:'flex',alignItems:'center',gap:7}}>
            <span style={{fontSize:13,fontWeight:800,color:C.accent,letterSpacing:-.3}}>Harness</span>
            <span style={{fontSize:10,fontWeight:700,letterSpacing:1,color:C.muted,textTransform:'uppercase',background:'rgba(0,0,0,0.05)',padding:'2px 6px',borderRadius:3}}>DEV TOOL</span>
          </div>
        </div>

        {/* Search */}
        <div style={{display:'flex',justifyContent:'center'}}>
          <div style={{
            display:'flex',alignItems:'center',gap:9,
            background:'#ede9df',border:`1px solid ${C.border}`,
            borderRadius:6,padding:'5px 12px',
            minWidth:280,maxWidth:440,fontSize:12,color:C.muted,cursor:'text',
          }}>
            <HIcon.Search size={12}/>
            <span>Search threads, sessions, settings…</span>
            <span style={{marginLeft:'auto',display:'inline-flex',alignItems:'center',gap:3}}>
              <kbd style={{padding:'1px 5px',borderRadius:3,background:'#e8e4da',border:`1px solid #ccc8be`,fontSize:10,fontFamily:C.mono,display:'inline-flex',alignItems:'center',gap:2}}>
                <HIcon.Command size={9}/>&thinsp;K
              </kbd>
            </span>
          </div>
        </div>

        {/* Status chip + dark mode */}
        <div style={{display:'flex',justifyContent:'flex-end',alignItems:'center',gap:10}}>
          <span style={{color:C.muted,cursor:'pointer',display:'inline-flex',padding:4}}>🌙</span>
          <div style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:C.muted,padding:'4px 10px',border:`1px solid ${C.border}`,borderRadius:5,background:C.bg}}>
            <HIcon.Dot color='#2d9d5b'/>
            <span>localhost</span>
            <span style={{width:1,height:12,background:C.border}}/>
            <span>backend</span>
          </div>
        </div>
      </div>

      {/* ── BODY ── */}
      <div style={{flex:1,display:'flex',minHeight:0}}>
        {/* ── RAIL ── */}
        <div style={{
          width:56,background:C.railBg,
          borderRight:`1px solid ${C.border}`,
          display:'flex',flexDirection:'column',
          alignItems:'center',paddingTop:10,gap:2,
          flexShrink:0,
        }}>
          {/* New button */}
          <button onClick={()=>setActiveNav('agents')}
            style={{width:32,height:32,borderRadius:8,background:C.accent,border:'none',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',marginBottom:8,boxShadow:'0 2px 6px rgba(13,122,98,0.3)'}}>
            <HIcon.Plus size={14} style={{color:'#fff'}}/>
          </button>

          {NAV.map(item=>{
            const active = activeNav===item.id;
            return (
              <div key={item.id}
                onClick={()=>!item.soon&&setActiveNav(item.id)}
                title={item.soon?`${item.label} — coming soon`:item.label}
                style={{
                  position:'relative',
                  display:'flex',flexDirection:'column',alignItems:'center',gap:4,
                  color: active?C.accent:item.soon?'#c8c4bc':C.muted,
                  padding:'7px 8px',borderRadius:8,width:50,
                  background:active?C.accentBg:'transparent',
                  cursor:item.soon?'default':'pointer',
                  opacity:item.soon?.55:1,
                }}>
                {active&&<span style={{position:'absolute',left:-14,width:3,height:22,borderRadius:2,background:C.accent,top:'50%',transform:'translateY(-50%)'}}/>}
                {item.icon}
                <span style={{fontSize:9.5,fontWeight:active?700:400,letterSpacing:.2}}>{item.label}</span>
                {item.soon&&<span style={{position:'absolute',top:2,right:2,fontSize:7,fontWeight:700,color:C.muted,letterSpacing:.5}}>SOON</span>}
              </div>
            );
          })}
        </div>

        {/* ── CONTENT ── */}
        <div style={{flex:1,display:'flex',minWidth:0,minHeight:0}}>
          {children}
        </div>
      </div>
    </div>
  );
}

// ── SQL WRAPPER (strips its own chrome since AppShell handles it) ─────────────
function SQLView() {
  return <HarnessPaper embedded />;
}

// ── SSH / COMING SOON PLACEHOLDER ────────────────────────────────────────────
function ComingSoon({ label }) {
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:16,color:C.muted,background:'#fafaf5'}}>
      <div style={{fontSize:32,opacity:.3}}>⌛</div>
      <div style={{fontSize:18,fontWeight:700,color:C.text,opacity:.4}}>{label}</div>
      <div style={{fontSize:13,opacity:.5}}>Coming soon</div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App() {
  const [activeNav, setActiveNav] = useState('agents');

  const views = {
    agents:   <AgentsView/>,
    sql:      <SQLView/>,
    ssh:      <SSHView/>,
    memory:   <ComingSoon label="Memory"/>,
    settings: <ComingSoon label="Settings"/>,
  };

  return (
    <AppShell activeNav={activeNav} setActiveNav={setActiveNav}>
      {views[activeNav] || views.agents}
    </AppShell>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
